<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zaragram</title>
    <style>
      :root { color-scheme: light; }
      body { margin: 0; font-family: Arial, Helvetica, sans-serif; background:#f6f6f6; color:#111; }
      .top { display:flex; justify-content:space-between; padding:20px 36px; border-bottom:1px solid #ddd; background:#fff; }
      .logo { font-size:38px; letter-spacing:10px; font-weight:600; }
      .container { max-width:1200px; margin:30px auto; padding:0 20px; }
      .panel { background:#fff; border:1px solid #e4e4e4; padding:20px; margin-bottom:18px; }
      input { width:100%; padding:12px; border:1px solid #bbb; font-size:14px; margin-bottom:10px; }
      button { padding:12px 16px; border:none; background:#111; color:#fff; cursor:pointer; }
      .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
      .card { background:#fff; border:1px solid #e5e5e5; }
      .card img { width:100%; height:280px; object-fit:cover; background:#fafafa; }
      .meta { padding:12px; font-size:14px; }
      .muted { color:#666; font-size:13px; }
      .links { max-height:140px; overflow:auto; font-size:13px; line-height:1.5; }
    </style>
  </head>
  <body>
    <header class="top">
      <div class="logo">ZARAGRAM</div>
      <div class="muted">Zara Fiyat Takip + Telegram Entegrasyonu</div>
    </header>

    <main class="container">
      <section class="panel">
        <h3>Ürün Takip Ekle</h3>
        <input id="url" placeholder="https://www.zara.com/tr/..." />
        <input id="chatId" placeholder="Telegram Chat ID (opsiyonel)" />
        <button id="addBtn">Takibe Al</button>
      </section>

      <section class="panel">
        <h3>Zara Ülke Linkleri (otomatik taranan)</h3>
        <div id="countries" class="links muted">Yükleniyor...</div>
      </section>

      <section class="panel">
        <h3>Takip Edilen Ürünler</h3>
        <button id="refreshBtn">Fiyatları Güncelle</button>
        <div id="products" class="grid" style="margin-top:12px"></div>
      </section>
    </main>

    <script>
      async function loadCountries() {
        const res = await fetch('/api/countries');
        const data = await res.json();
        countries.innerHTML = data.links.map(link => `<div>${link}</div>`).join('');
      }

      async function loadProducts() {
        const res = await fetch('/api/products');
        const data = await res.json();
        products.innerHTML = data.products.map(p => `
          <article class="card">
            <img src="${p.image || ''}" alt="${p.name}" />
            <div class="meta">
              <div><strong>${p.name}</strong></div>
              <div>${p.price} ${p.currency}</div>
              <div class="muted">${new Date(p.checkedAt).toLocaleString('tr-TR')}</div>
            </div>
          </article>
        `).join('') || '<p class="muted">Henüz ürün eklenmedi.</p>';
      }

      addBtn.onclick = async () => {
        const payload = { url: url.value.trim(), chatId: chatId.value.trim() || undefined };
        const res = await fetch('/api/products', {
          method:'POST',
          headers:{'content-type':'application/json'},
          body:JSON.stringify(payload)
        });
        if (!res.ok) {
          const err = await res.json();
          alert(err.error || 'Ürün eklenemedi');
          return;
        }
        url.value = '';
        await loadProducts();
      };

      refreshBtn.onclick = async () => {
        await fetch('/api/refresh', { method:'POST' });
        await loadProducts();
      };

      loadCountries();
      loadProducts();
    </script>
  </body>
</html>
